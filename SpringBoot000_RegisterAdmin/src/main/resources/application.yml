server:
  port: 8081
  servlet:
    context-path: /SpringBoot000_RegisterAdmin


spring:
  application:
    name: SpringBoot000_RegisterAdmin
  # 配置数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/Idea060_001_springboot?serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&useSSL=false
    username: root
    password: root
  mvc:
    view:
      prefix: /admin01/
      suffix: .jsp


#mybatis配置信息
mybatis:
  # xml映射文件所在的路径，一般用模糊匹配来指定最终的xml文件
  mapper-locations: classpath:/dao/*.xml
  configuration:
    #采用驼峰形式将数据表中以‘_’分隔的字段映射到java类的某个属性,比如表字段user_name可以映射为类里面的userName属性
    map-underscore-to-camel-case: true